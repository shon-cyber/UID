<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TourGuide</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">{TourGuide }</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="explore.html">Explore</a></li>
            <li><a href="add-city.html" class="btn btn-primary">Add City</a></li>
        </ul>
    </nav>

    <div class="form-container fade-in" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
        <div class="form-box glassmorphism scale-in" style="max-width: 450px; width: 100%;">
            <h2 style="margin-bottom: 5px;">Welcome Back</h2>
            <p style="margin-bottom: 25px; color: #666;">Please login to continue.</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                    <span class="error-message" id="name-error"></span>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                    <span class="error-message" id="email-error"></span>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="********">
                    <span class="error-message" id="password-error"></span>
                </div>
                <button type="submit" class="btn btn-large w-100" style="margin-top: 1.5rem;">Login</button>
                <div class="status-message" id="statusMsg" style="margin-top: 15px;"></div>
                <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            
            let isValid = true;
            if(!name.match(/^[a-zA-Z ]+$/)) {
                document.getElementById("name-error").innerText = "Please enter a valid name";
                isValid = false;
            } else {
                document.getElementById("name-error").innerText = "";
            }
            if(!email.match(/^\S+@\S+\.\S+$/)) {
                document.getElementById("email-error").innerText = "Please enter a valid email";
                isValid = false;
            } else {
                document.getElementById("email-error").innerText = "";
            }

            if (!isValid) return;

            const success = loginUser(email, password);
            if(success) {
                document.getElementById("statusMsg").innerText = "Login successful! Redirecting...";
                document.getElementById("statusMsg").style.color = "green";
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                document.getElementById("statusMsg").innerText = "Invalid credentials. Have you signed up?";
                document.getElementById("statusMsg").style.color = "red";
            }
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
